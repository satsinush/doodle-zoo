<!DOCTYPE html>
<html>
<head>
  <title>Doodle Aquarium</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <h1>Doodle Aquarium</h1>
  <div class="canvas-container">
    <canvas id="drawing-canvas" width="200" height="150"></canvas>
  </div>

  <div class="toolbar">
    <button id="tool-brush" class="tool-btn active" title="Brush Tool">🖌️</button>
    <button id="tool-fill" class="tool-btn" title="Fill Bucket">🪣</button>
    <button id="undo-btn" class="tool-btn" title="Undo">↩️</button>
    <button id="redo-btn" class="tool-btn" title="Redo">↪️</button>
  </div>

  <div class="controls">
    <input type="color" id="color-picker" value="#000000" title="Color">
    <input type="range" id="brush-size" min="1" max="20" value="5" title="Brush Size">
    <button id="clear-btn">Clear</button>
    <button id="save-btn">Save Fish</button>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">My Fish</h2>
    <button id="settings-btn" title="Settings">⚙️</button>
  </div>
  <div id="fish-list">
    <!-- Fish items will be added here -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
