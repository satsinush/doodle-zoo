<!DOCTYPE html>
<html>
<head>
  <title>Doodle Aquarium</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <h1>Doodle Aquarium</h1>
      <div class="header-actions">
        <button id="open-window-btn" class="secondary-btn" type="button">Open Full Window</button>
      </div>
    </header>

    <div class="canvas-container">
      <canvas id="drawing-canvas" width="400" height="300"></canvas>
      <div id="direction-indicator" class="direction-indicator" aria-live="polite">Head points -&gt;</div>
    </div>

    <div class="controls">
      <div class="field tools-row">
        <label>Tool</label>
        <div class="tool-options">
          <label><input type="radio" name="tool" value="brush" checked> Brush</label>
          <label><input type="radio" name="tool" value="fill"> Fill Bucket</label>
        </div>
      </div>

      <div class="field">
        <label for="color-picker">Color</label>
        <div class="color-row">
          <input type="color" id="color-picker" value="#000000" aria-label="Pick color">
          <input type="text" id="color-text" value="#000000" placeholder="Any CSS color" aria-label="Custom color">
        </div>
      </div>

      <div class="field">
        <label for="brush-size">Brush Size</label>
        <input type="range" id="brush-size" min="1" max="20" value="5">
      </div>

      <div class="field direction-row">
        <label for="fish-direction">Fish Direction</label>
        <select id="fish-direction">
          <option value="right">Right -&gt;</option>
          <option value="left">&lt;- Left</option>
        </select>
      </div>

      <div class="buttons-row">
        <button id="undo-btn" class="secondary-btn" type="button" disabled>Undo</button>
        <button id="redo-btn" class="secondary-btn" type="button" disabled>Redo</button>
        <button id="clear-btn" class="secondary-btn" type="button">Clear</button>
        <label class="secondary-btn" style="cursor: pointer;">
          Import
          <input type="file" id="import-file" accept="image/*" style="display: none;">
        </label>
        <button id="save-btn" type="button">Save Fish</button>
      </div>
    </div>

    <h2>My Fish</h2>
    <div id="fish-list">
      <!-- Fish items will be added here -->
    </div>

    <div id="settings-panel" style="border-top: 1px solid #ddd; margin-top: 16px; padding-top: 16px;">
      <h2>Settings</h2>
      <div class="field">
        <label for="speed-multiplier">Fish Speed</label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input id="speed-multiplier" type="range" min="0.4" max="2.5" step="0.1" value="1">
          <span id="speed-value" style="font-size: 13px;">1.0x</span>
        </div>
      </div>
      <div class="field">
        <label for="size-multiplier">Fish Size</label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input id="size-multiplier" type="range" min="0.4" max="2.5" step="0.1" value="1">
          <span id="size-value" style="font-size: 13px;">1.0x</span>
        </div>
      </div>
      <div class="buttons-row">
        <button id="save-settings" type="button">Save Settings</button>
        <button id="reset-settings" class="secondary-btn" type="button">Reset</button>
      </div>
      <p id="status" class="status" aria-live="polite" style="color: green; font-size: 13px; margin-top: 8px;"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
