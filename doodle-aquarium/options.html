<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Doodle Aquarium Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="settings-shell">
    <h1>Aquarium Settings</h1>

    <section class="panel">
      <label for="speed-multiplier">Fish Speed</label>
      <input id="speed-multiplier" type="range" min="0.4" max="2.5" step="0.1" value="1">
      <div class="value" id="speed-value">1.0x</div>
    </section>

    <section class="panel">
      <label for="size-multiplier">Fish Size</label>
      <input id="size-multiplier" type="range" min="0.4" max="2.5" step="0.1" value="1">
      <div class="value" id="size-value">1.0x</div>
    </section>

    <div class="actions">
      <button id="save-settings" type="button">Save Settings</button>
      <button id="reset-settings" class="secondary" type="button">Reset</button>
    </div>

    <p id="status" class="status" aria-live="polite"></p>
  </main>

  <script src="options.js"></script>
</body>
</html>
